<div class="sign-in-container">
  <mat-card class="sign-in-card">
    <mat-card-header>
      <mat-card-title>
        <h1 class="ascenso-title">ASCENSO</h1>
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="signInForm" (ngSubmit)="onSubmit()" class="sign-in-form">

        @if (errorMessage()) {
        <div class="error-message">{{ errorMessage() }}</div>
        }

        @if(signInForm.get('email')?.hasError('email')) {
        <div class="error-message">El correo electrónico no es válido.</div>
        }

        <mat-form-field appearance="outline">
          <mat-label>Correo Electrónico</mat-label>
          <input matInput formControlName="email" type="email" placeholder="tu@email.com">
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password" placeholder="********">
          <mat-icon matPrefix>lock</mat-icon>
        </mat-form-field>

        <div class="actions">
          <button mat-flat-button color="primary" type="submit" class="submit-button" [class.loading]="isLoading()"
            [disabled]="signInForm.invalid || isLoading()">
            <span class="button-text" [class.hidden]="isLoading()">Entrar</span>
            @if (isLoading()) {
            <mat-progress-spinner diameter="24" mode="indeterminate" class="spinner"></mat-progress-spinner>
            }
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
